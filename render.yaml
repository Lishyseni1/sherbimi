services:
  - type: web
    name: sherbimi-yt
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m flask --app run db upgrade && gunicorn run:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: sherbimi-yt-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
    disk:
      name: sherbimi-uploads
      mountPath: /opt/render/project/src/static/uploads
      sizeGB: 1

databases:
  - name: sherbimi-yt-db
    plan: free
