<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | SherbimiYt</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <main class="section">
    <div class="container narrow">
      <section class="form-card">
        <h1>Admin Login</h1>
        <p>Ky panel është vetëm për administratorin.</p>
        <form method="post">
          <label for="username">Username</label>
          <input id="username" name="username" type="text" required>
          <label for="password">Password</label>
          <input id="password" name="password" type="password" required>
          <button class="btn btn-primary" type="submit">Hyr</button>
          <a class="btn btn-light" href="{{ url_for('public.index') }}">Kthehu në faqe</a>
          {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
            <p class="form-message {{ category }}">{{ message }}</p>
            {% endfor %}
          {% endwith %}
        </form>
      </section>
    </div>
  </main>
</body>
</html>
